<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:#15161a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#eee; min-height:100%; }
  .wrap{ display:flex; gap:48px; padding:40px; justify-content:center; flex-wrap:wrap; align-items:flex-start; }
  .col{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .label{ font-size:14px; font-weight:600; letter-spacing:.04em; color:#b6b5b0; text-transform:uppercase; }
  .phone{ width:390px; height:844px; border-radius:46px; background:#0B0B0C; padding:12px; box-shadow:0 0 0 11px #1f2025, 0 30px 70px rgba(0,0,0,.6); position:relative; }
  .phone::before{ content:""; position:absolute; top:18px; left:50%; transform:translateX(-50%); width:118px; height:28px; background:#1f2025; border-radius:0 0 18px 18px; z-index:3; }
  iframe{ width:100%; height:100%; border:0; border-radius:36px; background:#0B0B0C; display:block; }
  .hint{ text-align:center; font-size:13px; color:#8a8a8a; padding:8px 40px 0; }
</style>
</head>
